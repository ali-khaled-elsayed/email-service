services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=email_service
      - DB_USERNAME=email_service
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=email_service
      - DB_USERNAME=email_service
      - DB_PASSWORD=secret
      - QUEUE_CONNECTION=database
    depends_on:
      - mysql
    command: php artisan queue:work database --queue=emails-high,emails-default,emails-low,emails-bulk,emails-retry --sleep=3 --tries=1

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    command: php artisan schedule:work

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: email_service
      MYSQL_USER: email_service
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
