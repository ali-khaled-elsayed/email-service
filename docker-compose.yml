# Email Service Platform - Production Docker Compose
#
# Services: app (Apache + PHP), mysql, queue, scheduler
#
# Quick start:
#   cp .env.docker.example .env
#   docker compose build
#   docker compose up -d
#
# Queue worker:
#   php artisan queue:work database --queue=emails-high,emails-default,emails-low,emails-bulk,emails-retry

name: email-service

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    image: email-service-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_COMPOSER_INSTALL: ${RUN_COMPOSER_INSTALL:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
      RUN_QUEUE_WORKER: ${RUN_QUEUE_WORKER:-true}
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-email_service}
      DB_USERNAME: ${MYSQL_USER:-email_service}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - email-service
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-email_service}
      MYSQL_USER: ${MYSQL_USER:-email_service}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - email-service
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    image: email-service-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - email-service
    command: ["php", "artisan", "queue:work", "database", "--queue=emails-high,emails-default,emails-low,emails-bulk,emails-retry", "--sleep=3", "--tries=3", "--timeout=120"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan queue:monitor emails-high,emails-default,emails-low,emails-bulk,emails-retry --max=1000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    image: email-service-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - email-service
    command: ["php", "artisan", "schedule:work"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan schedule:list > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  email-service:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
