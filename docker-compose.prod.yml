name: email-service

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - email-service
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: nginx
    image: ${NGINX_IMAGE:-email-service-nginx}:${APP_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - app_storage:/var/www/html/storage/app:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - email-service
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups/mysql:/backups
    networks:
      - email-service
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
      start_period: 120s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file:
      - .env
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ] && [ "$$REDIS_PASSWORD" != "null" ]; then
          exec redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - email-service
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ] && [ "$$REDIS_PASSWORD" != "null" ]; then
            redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  queue:
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      QUEUE_WORKERS_HIGH: ${QUEUE_WORKERS_HIGH:-2}
      QUEUE_WORKERS_DEFAULT: ${QUEUE_WORKERS_DEFAULT:-2}
      QUEUE_WORKERS_LOW: ${QUEUE_WORKERS_LOW:-1}
      QUEUE_WORKERS_BULK: ${QUEUE_WORKERS_BULK:-2}
      QUEUE_WORKERS_RETRY: ${QUEUE_WORKERS_RETRY:-1}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - email-service
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "supervisorctl status | awk 'BEGIN { seen=0; bad=0 } { seen=1; if ($2 != \"RUNNING\") bad=1 } END { exit (!seen || bad) }'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler:
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - email-service
    command: ["php", "artisan", "schedule:work"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "php artisan schedule:list > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  email-service:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
