name: email-service

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_COMPOSER_INSTALL: ${RUN_COMPOSER_INSTALL:-false}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      RUN_SEEDERS: ${RUN_SEEDERS:-true}
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - email-service
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backups/mysql:/backups
    networks:
      - email-service
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

  queue:
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - email-service
    command: ["php", "artisan", "queue:work", "database", "--queue=emails-high,emails-default,emails-low,emails-bulk,emails-retry", "--sleep=3", "--tries=3", "--timeout=120"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "php artisan queue:monitor emails-high,emails-default,emails-low,emails-bulk,emails-retry --max=1000 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  scheduler:
    image: ${APP_IMAGE:-email-service-app}:${APP_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      AUTO_GENERATE_APP_KEY: ${AUTO_GENERATE_APP_KEY:-true}
      RUN_MIGRATIONS: "false"
      RUN_SEEDERS: "false"
      OPTIMIZE_ON_BOOT: ${OPTIMIZE_ON_BOOT:-true}
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    volumes:
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - email-service
    command: ["php", "artisan", "schedule:work"]
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "php artisan schedule:list > /dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  email-service:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local
